name: CI — API Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, prod]
  repository_dispatch:
    types: [run-api-tests]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Create config.properties from example
        run: cp src/test/resources/config.properties.example src/test/resources/config.properties

      - name: Run API tests
        run: |
          mvn test --no-transfer-progress \
            -Dexecution.type=API \
            -Dapi.mock=false \
            -Dui.mock=false \
            -Dbase.url="${{ secrets.BASE_URL }}" \
            -Dapi.base.url="${{ secrets.API_BASE_URL }}" \
            -Dadmin.username="${{ secrets.ADMIN_USERNAME }}" \
            -Dadmin.password="${{ secrets.ADMIN_PASSWORD }}" \
            -Dstaff.username="${{ secrets.STAFF_USERNAME }}" \
            -Dstaff.password="${{ secrets.STAFF_PASSWORD }}"

      - name: Print Surefire failure details
        if: failure()
        run: |
          echo "===== SUREFIRE FAILURE REPORTS ====="
          find target/surefire-reports -name '*.txt' | xargs cat || true

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-api
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports-api
          path: target/extent-reports/
          retention-days: 7

  deploy-pages:
    name: Deploy Reports to GitHub Pages
    needs: api-tests
    if: github.ref == 'refs/heads/main' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Extent Reports
        uses: actions/download-artifact@v4
        with:
          name: extent-reports-api
          path: public

      - name: Create index.html redirect
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="vi">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="0; url=./ExtentReport.html" />
            <title>ERP Test Report — Đang chuyển hướng...</title>
            <style>
              body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
              .box { text-align: center; }
              .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
              @keyframes spin { to { transform: rotate(360deg); } }
              p { color: #6b7280; font-size: 14px; }
              a { color: #2563eb; font-weight: 600; }
            </style>
          </head>
          <body>
            <div class="box">
              <div class="spinner"></div>
              <p>Đang mở Test Report... <a href="./ExtentReport.html">Click vào đây nếu không tự chuyển</a></p>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
