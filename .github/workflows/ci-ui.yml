name: CI — UI Tests (Headless)

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to use"
        required: false
        default: "chrome"
        type: choice
        options:
          - chrome
  schedule:
    - cron: "0 1 * * *" # Chạy mỗi ngày lúc 1:00 AM UTC (8:00 AM GMT+7)

jobs:
  ui-tests:
    name: Run UI Tests (Headless Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Chrome installation
        run: google-chrome --version

      - name: Create config.properties from example
        run: cp src/test/resources/config.properties.example src/test/resources/config.properties

      - name: Run UI tests (headless)
        run: |
          mvn test \
            -Dexecution.type=UI \
            -Dheadless=true \
            -Dbrowser=${{ inputs.browser || 'chrome' }} \
            -Dbase.url=${{ secrets.BASE_URL }} \
            -Dapi.base.url=${{ secrets.API_BASE_URL }} \
            -Dauth.token=${{ secrets.AUTH_TOKEN }} \
            -Dadmin.username=${{ secrets.ADMIN_USERNAME }} \
            -Dadmin.password=${{ secrets.ADMIN_PASSWORD }} \
            -Dstaff.username=${{ secrets.STAFF_USERNAME }} \
            -Dstaff.password=${{ secrets.STAFF_PASSWORD }}

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-ui
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports-ui
          path: target/extent-reports/
          retention-days: 7

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-failure
          path: screenshots/
          retention-days: 3
